<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forja - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="login.css">
</head>
<body class="login-body">

    <div class="login-container">
        <div class="logo" style="justify-content: center; margin-bottom: 40px;">
            <div class="logo-icon">M</div>
            Forja <span class="logo-subtitle">PRODUCTION OS</span>
        </div>

        <div class="login-header">
            <h1>Bem-vindo de volta</h1>
            <p>Entre para acompanhar sua produção em tempo real.</p>
        </div>

        <form class="login-form">
            <div class="input-group">
                <label for="email">E-mail</label>
                <div class="input-wrapper">
                    <span class="icon">✉</span>
                    <input type="email" id="email" placeholder="voce@empresa.com">
                </div>
            </div>

            <div class="input-group">
                <label for="password">Senha</label>
                <div class="input-wrapper">
                    <span class="icon">🔒</span>
                    <input type="password" id="password" placeholder="••••••••">
                </div>
            </div>

            <div class="form-options">
                <label class="checkbox-container">
                    <input type="checkbox">
                    <span class="checkmark"></span>
                    Manter conectado
                </label>
                <a href="#" class="forgot-password">Esqueceu a senha?</a>
            </div>

            <button type="submit" class="btn-entrar">
                Entrar <span>→</span>
            </button>
        </form>

        <div class="divider">
            <span>ou</span>
        </div>

        <button class="btn-google">
            <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" alt="Google" width="18">
            Continuar com Google
        </button>

        <p class="signup-text">
            Ainda não tem conta? <a href="cadastro.html">Criar conta</a>
        </p>

        <footer class="login-footer">
            © 2026 Forja Production OS
        </footer>
    </div>
<script>
    const form = document.querySelector('.login-form');
    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const email = document.querySelector('input[type="email"]').value;
        const senha = document.querySelector('input[type="password"]').value;

        const response = await fetch('http://localhost:3000/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, senha })
        });

        const data = await response.json();
        if (response.ok) {
            window.location.href = 'dashboard.html'; // Vai para o Dashboard se acertar
        } else {
            alert(data.message);
        }
    });
</script>
</body>
</html>
