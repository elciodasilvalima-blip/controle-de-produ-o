<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forja - Gestão de Usuários</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="usuarios.css">
</head>
<body class="dashboard-body">

    <!-- BARRA LATERAL -->
    <aside class="sidebar">
        <div class="logo-area">
            <div class="logo-box">F</div>
            <div>
                <span class="brand-name">Forja</span>
                <span class="brand-tag">PRODUCTION OS</span>
            </div>
        </div>
        <nav class="nav-menu">
            <p class="nav-label">OPERAÇÃO</p>
            <a href="dashboard.html" class="nav-link">📊 Visão geral</a>
            <a href="#" class="nav-link active">👥 Usuários</a> <!-- Link Ativo -->
            <a href="#" class="nav-link">📦 Projetos</a>
            <a href="#" class="nav-link">📈 Relatórios</a>
        </nav>
    </aside>

    <!-- CONTEÚDO PRINCIPAL -->
    <main class="main-content">
        <!-- CABEÇALHO DA PÁGINA -->
        <header class="main-header">
            <div class="header-titles">
                <p class="breadcrumb">CONFIGURAÇÕES</p>
                <h1>Gestão de Usuários</h1>
                <p class="header-desc">Visualize, edite ou remova acessos ao sistema.</p>
            </div>
            <button class="btn-primary" onclick="abrirModalCadastro()">+ Novo usuário</button>
        </header>

        <!-- TABELA DE USUÁRIOS -->
        <section class="content-row">
            <div class="projects-list">
                <table class="user-table">
                    <thead>
                        <tr>
                            <th>Nome</th>
                            <th>Login / E-mail</th>
                            <th>Status</th>
                            <th style="text-align: right;">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="lista-usuarios">
    <!-- O JavaScript vai preencher aqui automaticamente -->
</tbody>
                </table>
            </div>
        </section>
    </main>
<!-- Modal de Novo Usuário -->
<div id="modalUsuario" class="modal">
    <div class="modal-content">
        <span class="close" onclick="fecharModal()">&times;</span>
        <h2>Cadastrar Novo Usuário</h2>
        <form id="formNovoUsuario">
            <div class="input-group">
                <label>Nome Completo</label>
                <input type="text" id="nome" placeholder="Ex: João Silva" required>
            </div>
            <div class="input-group">
                <label>E-mail (Login)</label>
                <input type="email" id="email" placeholder="email@forja.com" required>
            </div>
            <div class="input-group">
                <label>Senha Provisória</label>
                <input type="password" id="senha" required>
            </div>
            <button type="submit" class="btn-primary" style="width: 100%; margin-top: 20px;">Salvar Usuário</button>
        </form>
    </div>
</div>

<script>
    const modal = document.getElementById("modalUsuario");
    const btnNovo = document.querySelector(".btn-primary");

    // Abre o modal ao clicar no botão verde
    btnNovo.onclick = () => modal.style.display = "flex";

    // Fecha ao clicar no X
    function fecharModal() { modal.style.display = "none"; }

    // Fecha ao clicar fora da caixa
    window.onclick = (event) => { if (event.target == modal) fecharModal(); }

    // Integração com o Servidor (Back-end)
    document.getElementById("formNovoUsuario").addEventListener("submit", async (e) => {
        e.preventDefault();
        
        const dados = {
            nome: document.getElementById("nome").value,
            email: document.getElementById("email").value,
            senha: document.getElementById("senha").value
        };

        const response = await fetch('http://localhost:3000/api/cadastro', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(dados)
        });

        if (response.ok) {
            alert("Usuário cadastrado no Railway!");
            fecharModal();
            location.reload(); // Atualiza a tabela
        } else {
            alert("Erro ao salvar usuário.");
        }
    });
</script>
    <script src="usuarios.js"></script>
</body>
</html>
