<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Cadastro</title>

<style>
body {
  background:#0b1220;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box {
  background:#111827;
  padding:30px;
  border-radius:10px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

input {
  padding:10px;
}

button {
  padding:10px;
  background:#22c55e;
  border:none;
  color:#fff;
}
</style>
</head>

<body>

<div class="box">
  <h2 style="color:white;">Cadastro de Usuário</h2>

  <input type="text" placeholder="Nome">
  <input type="text" placeholder="Usuário">
  <input type="password" placeholder="Senha">

  <button>Cadastrar</button>
</div>

</body>
</html>
