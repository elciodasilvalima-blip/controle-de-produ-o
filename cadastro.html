<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forja - Criar Conta</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="cadastro.css">
</head>
<body class="login-body">

    <div class="login-container">
        <div class="login-header">
            <h1>Criar conta</h1>
            <p>Comece grátis. Sem cartão, sem compromisso.</p>
        </div>

        <form class="login-form">
            <div class="input-group">
                <label for="nome">Nome completo</label>
                <div class="input-wrapper">
                    <span class="icon">👤</span>
                    <input type="text" id="nome" placeholder="Marina Costa">
                </div>
            </div>

            <div class="input-group">
                <label for="email">E-mail corporativo</label>
                <div class="input-wrapper">
                    <span class="icon">✉</span>
                    <input type="email" id="email" placeholder="voce@empresa.com">
                </div>
            </div>

            <div class="input-group">
                <label for="password">Senha</label>
                <div class="input-wrapper">
                    <span class="icon">🔒</span>
                    <input type="password" id="password" placeholder="Mínimo 8 caracteres">
                </div>
            </div>

            <div class="form-options">
                <label class="checkbox-container">
                    <input type="checkbox" required>
                    <span class="checkmark"></span>
                    Concordo com os <a href="#" class="inline-link">Termos</a> e a <a href="#" class="inline-link">Política de Privacidade</a>.
                </label>
            </div>

            <button type="submit" class="btn-entrar">
                Criar minha conta <span>→</span>
            </button>
        </form>

        <p class="signup-text">
            Já tem uma conta? <a href="login.html">Entrar</a>
        </p>
    </div>
<script>
    const form = document.querySelector('.login-form');
    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const nome = document.querySelector('#nome').value;
        const email = document.querySelector('#email').value;
        const senha = document.querySelector('#password').value;

        console.log('📤 Enviando dados para o servidor...');

        try {
            const response = await fetch('http://localhost:3000/api/cadastro', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nome, email, senha })
            });

            const data = await response.json();

            if (response.ok) {
                console.log('✅ Servidor respondeu com sucesso:', data);
                alert(data.message);
                window.location.href = 'login.html';
            } else {
                console.error('❌ Servidor retornou erro:', data.message);
                alert('Erro: ' + data.message);
            }
        } catch (error) {
            console.error('❌ Falha na conexão (CORS ou Servidor desligado):', error);
            alert('Não foi possível conectar ao servidor. Verifique se o Node.js está rodando.');
        }
    });
</script>
</body>
</html>
